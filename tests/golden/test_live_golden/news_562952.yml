content: 'Bartosz " {{link_0}} " Bernacki has {{link_1}} that {{link_2}} has allowed
  him to explore options as a restricted free agent.


  “Still under contract with Team Vitality but I''ve been allowed to explore my options
  for the upcoming season while they decide on the team''s shape going forward,” UNFAKE
  said in his announcement. He expressed willingness to serve as an in-game leader
  or secondary caller, as well as potentially relocate.


  UNFAKE joined Vitality in June of this year following a disappointing {{link_3}}
  where they exited the EMEA playoffs in the top eight, failing to reach Masters Toronto
  after setting a high bar for themselves with a {{link_4}} win and a fourth-place
  finish at {{link_5}} . With the team''s previous in-game leader Saif " {{link_6}}
  " Jibraeel choosing to take a temporary break from competition, UNFAKE was brought
  in from {{link_7}} in {{link_8}} to replace him.


  Vitality ultimately concluded {{link_9}} with similarly middling results to Stage
  1. After scraping into the playoffs with a 2-3 record, they once again exited playoffs
  in the first round of the lower bracket, finding themselves unable to qualify for
  the French organization''s hometown event in Champions Paris.


  {{link_10}} is now:


  -  Nikita " {{link_11}} " Niko Sirmitev

  -  Kimmie " {{link_12}} " Laasner

  -  Blendi " {{link_13}} " Kovaci

  -  Felipe " {{link_14}} " de Loyola Basso

  -  Saif " {{link_15}} " Jibraeel

  -  Ștefan " {{link_16}} " Mîtcu

