content: '{{link_0}} has {{link_1}} the departure of head coach Tang " {{link_2}}
  " Shijun (唐时俊) .


  Muggle''s long tenure with the team began back in 2022, when he joined as a coach
  under previous head coach Lo " {{link_3}} " Wen-Hsin (罗文信) . Following disappointing
  losses for EDG at {{link_4}} and the beginning of {{link_5}} in 2024, AfteR was
  moved to an inactive role, leaving Muggle to take up the mantle of head coach in
  his stead.


  With the addition of Hsien " {{link_6}} " Meng-Hsun (谢孟勋) at the same time and Muggle
  at the helm, EDG went on to make history two months later by winning China''s first
  global title at {{link_7}} .


  One of the first from China to lift an international trophy. (Photo by Colin Young-Wolff/Riot
  Games)


  2025 was a more challenging year for EDG. After placing third at {{link_8}} , the
  team struggled to return to the top, missing out on an international event for the
  first time when they failed to qualify to Masters Toronto with a fourth-place domestic
  finish in {{link_9}} . The defending champions managed to return to the global stage
  for {{link_10}} as China''s third seed, but their run ended early with a winless
  exit in the group stage, bringing an end to their season.


  {{link_11}} is currently:


  -  Wang " {{link_12}} " Senxu (王森旭)

  -  Zheng " {{link_13}} " Yongkang (郑永康)

  -  Wan " {{link_14}} " Shunzhi (万顺治)

  -  Zhang " {{link_15}} " Zhao (张钊)

  -  Zhang " {{link_16}} " Juntai (张君泰)

  -  Zhang " {{link_17}} " Juncheng (张峻程)

  -  Shou " {{link_18}} " Wenjun (寿文君) (Manager)

  -  Chen " {{link_19}} " Wang (Assistant coach)

  -  Li " {{link_20}} " Junsheng (李俊升) (Staff)


