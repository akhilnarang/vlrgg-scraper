name: Live Golden Parser Regression

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  live-golden:
    runs-on: ubuntu-latest

    env:
      REDIS_HOST: localhost
      REDIS_PASSWORD: ""
      TIMEZONE: UTC
      ENABLE_CACHE: "false"
      ENABLE_ID_MAP_DB: "false"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.14"

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Install dependencies
      run: uv sync

    - name: Generate internal API key
      run: echo "INTERNAL_API_KEY=$(openssl rand -hex 16)" >> $GITHUB_ENV

    - name: Run live golden parser tests
      run: uv run pytest -m live_golden tests/golden
